<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanDino - Quality Apps for Everyone</title>
    <meta name="description" content="CleanDino creates beautiful, functional apps. Download Raku JLPT for Japanese learning, Sae TOPIK for Korean vocabulary, and Age Calculator for accurate age calculation.">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon-32x32.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="CleanDino - Quality Apps">
    <meta property="og:description" content="Quality apps for everyone. JLPT study, TOPIK vocabulary, and Age Calculator.">
    <meta property="og:image" content="https://cleandino.github.io/apps/og-image.png">
    <meta property="og:url" content="https://cleandino.github.io/apps/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-page="home">
    <!-- Language & Theme Controls -->
    <div class="language-selector">
        <div class="lang-dropdown">
            <button class="lang-selected" aria-label="Select language">EN</button>
            <div class="lang-options">
                <button class="lang-option" data-lang="en">EN</button>
                <button class="lang-option" data-lang="ja">日本語</button>
                <button class="lang-option" data-lang="ko">한국어</button>
                <button class="lang-option" data-lang="vi">Tiếng Việt</button>
                <button class="lang-option" data-lang="zh">中文</button>
                <button class="lang-option" data-lang="id">Indonesia</button>
                <button class="lang-option" data-lang="th">ไทย</button>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <!-- Hero Section -->
    <header class="hero">
        <div class="container">
            <div class="hero-logo">
                <img src="images/cleandino_logo_512.png" alt="CleanDino" class="hero-logo-img" onerror="this.style.display='none'">
            </div>
            <h1 class="hero-title" data-i18n="hero.title">CleanDino</h1>
            <p class="hero-subtitle" data-i18n="hero.subtitle">Quality Apps for Everyone</p>
        </div>
    </header>

    <!-- App Grid -->
    <main class="apps-section">
        <div class="container">
            <div class="app-grid">

                <!-- Raku JLPT Card -->
                <a href="raku-jlpt/" class="app-grid-card" data-color="#E74C3C">
                    <div class="grid-card-icon">
                        <img src="images/raku-jlpt-icon.png" alt="Raku JLPT" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23E74C3C%22 width=%22100%22 height=%22100%22 rx=%2220%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2235%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3EJLPT%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="grid-card-info">
                        <h2 class="grid-card-name" data-i18n="raku.name">Raku JLPT Vocabulary</h2>
                        <p class="grid-card-tagline" data-i18n="raku.tagline">Master JLPT with Smart Learning</p>
                    </div>
                    <div class="grid-card-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                </a>

                <!-- Sae TOPIK Card -->
                <a href="sae-topik/" class="app-grid-card" data-color="#2E8B57">
                    <div class="grid-card-icon">
                        <img src="images/sae-topik-icon.png" alt="Sae TOPIK" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%232E8B57%22 width=%22100%22 height=%22100%22 rx=%2220%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2230%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-weight=%22bold%22%3ETOPIK%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="grid-card-info">
                        <h2 class="grid-card-name" data-i18n="topik.name">Sae TOPIK Vocabulary</h2>
                        <p class="grid-card-tagline" data-i18n="topik.tagline">Master TOPIK with Smart Learning</p>
                    </div>
                    <div class="grid-card-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                </a>

                <!-- Age Calculator Card -->
                <a href="age-calculator/" class="app-grid-card" data-color="#3498DB">
                    <div class="grid-card-icon">
                        <img src="images/age-calc-icon.png" alt="Age Calculator" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%233498DB%22 width=%22100%22 height=%22100%22 rx=%2220%22/%3E%3Ctext x=%2250%22 y=%2265%22 font-size=%2250%22 fill=%22white%22 text-anchor=%22middle%22 font-family=%22sans-serif%22%3E🎂%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="grid-card-info">
                        <h2 class="grid-card-name" data-i18n="age.name">Age Calculator</h2>
                        <p class="grid-card-tagline" data-i18n="age.tagline">Precise Age Calculation at Your Fingertips</p>
                    </div>
                    <div class="grid-card-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-copyright">&copy; 2025 CleanDino. All rights reserved.</p>
            <p class="footer-links">
                <a href="https://cleandino.github.io/" target="_blank" rel="noopener">Privacy Policy</a>
                <span class="footer-separator">&middot;</span>
                <a href="https://www.threads.com/@cd_labs" target="_blank" rel="noopener">Threads</a>
            </p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
